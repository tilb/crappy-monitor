name: CrappyMonitor
options:
  bundleIdPrefix: com.crappymonitor
  deploymentTarget:
    macOS: "13.0"
  xcodeVersion: "15.0"
  generateEmptyDirectories: true

settings:
  base:
    MACOSX_DEPLOYMENT_TARGET: "13.0"
    SWIFT_VERSION: "5.9"
    ENABLE_HARDENED_RUNTIME: YES

targets:
  CrappyMonitor:
    type: application
    platform: macOS
    bundleIdSuffix: app
    info:
      path: CrappyMonitor/Resources/Info.plist
      properties:
        LSUIElement: true
        NSSupportsAutomaticGraphicsSwitching: true
        NSPrincipalClass: NSApplication
        LSMinimumSystemVersion: "13.0"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.crappymonitor.app
        INFOPLIST_FILE: CrappyMonitor/Resources/Info.plist
        CODE_SIGN_ENTITLEMENTS: CrappyMonitor/Resources/CrappyMonitor.entitlements
        SWIFT_OBJC_BRIDGING_HEADER: ""
        LD_RUNPATH_SEARCH_PATHS: "$(inherited) @executable_path/../Frameworks"
    sources:
      - path: CrappyMonitor
        excludes:
          - "**/*.entitlements"

  CrappyMonitorTests:
    type: bundle.unit-test
    platform: macOS
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.crappymonitor.tests
        BUNDLE_LOADER: "$(TEST_HOST)"
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/CrappyMonitor.app/Contents/MacOS/CrappyMonitor"
        GENERATE_INFOPLIST_FILE: YES
        LD_RUNPATH_SEARCH_PATHS: "$(inherited) @executable_path/../Frameworks @loader_path/../Frameworks"
    sources:
      - path: CrappyMonitorTests
    dependencies:
      - target: CrappyMonitor

schemes:
  CrappyMonitor:
    build:
      targets:
        CrappyMonitor: all
        CrappyMonitorTests: [test]
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - CrappyMonitorTests
    profile:
      config: Release
    archive:
      config: Release
